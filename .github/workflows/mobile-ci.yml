name: mobile-ci

# Gate CI du client Flutter (Principe III — tests bloquants).
# Déclenché sur les changements du dossier mobile/.
on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.5'
          cache: true

      - name: Récupérer les dépendances
        run: flutter pub get

      - name: Analyse statique (zéro avertissement)
        run: flutter analyze

      - name: Tests unitaires + widget
        run: flutter test
