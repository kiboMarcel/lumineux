name: lumineux_mobile
description: "Application mobile membre Lumineux"
publish_to: 'none'

version: 1.0.0+1

environment:
  # Aligné sur le plan (Dart >= 3.7) plutôt que sur le Dart embarqué de Flutter,
  # pour rester compatible avec un SDK Dart autonome plus ancien.
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # État applicatif & injection de dépendances (SessionController, providers).
  flutter_riverpod: ^2.6.1
  # Navigation déclarative + redirection de session (garde).
  go_router: ^14.6.2
  # Client HTTP + intercepteurs (Bearer, erreurs).
  dio: ^5.7.0
  # Coffre sécurisé du jeton (Keychain iOS / Keystore Android).
  flutter_secure_storage: ^9.2.2
  # Localisation FR.
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.3
  # Signal « retour de connectivité » (événementiel, sans polling) pour la
  # synchronisation hors ligne M2 (feature 027). Épinglé en 6.x pour rester
  # compatible avec la toolchain Android stabilisée (AGP 8.7.3) : la 7.x tire
  # androidx.core 1.18 qui exige AGP 8.9.1+.
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Tests d'intégration de bout en bout.
  integration_test:
    sdk: flutter
  # Doubles de test (mocks).
  mocktail: ^1.0.4

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Manrope
      fonts:
        # Police variable (axe wght) — couvre les graisses 400 à 800.
        - asset: assets/fonts/Manrope-Variable.ttf
